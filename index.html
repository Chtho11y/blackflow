<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLACKSTREAM // forest</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="screen">
    <!-- Low-res scene canvas, scaled up via CSS for pixel look -->
    <canvas id="scene" width="320" height="200"></canvas>
    <!-- Post-processing overlay (VHS) at full screen resolution -->
    <canvas id="vhs"></canvas>

    <div id="hud">
      <div class="hud-line"><span class="blink">REC</span> &nbsp; SP-08 &nbsp; <span id="coord">00,00 N</span></div>
      <div class="hud-line bottom">BLACKSTREAM ARCHIVE // tape 03 // do not stray</div>
      <div id="zone" class="zone-indicator">Zone 1/5</div>
    </div>

    <div id="esc-menu" aria-hidden="true">
      <h2>System Menu</h2>
      <label><input id="opt-textures" type="checkbox" checked /> 贴图</label>
      <label><input id="opt-vhs" type="checkbox" checked /> VHS 滤镜</label>
      <label><input id="opt-coord" type="checkbox" checked /> 坐标显示</label>
      <label><input id="opt-minimap" type="checkbox" checked /> 小地图</label>
      <label><input id="opt-no-fog" type="checkbox" /> 关闭渐黑效果</label>
      <label for="opt-fov">视野 FOV: <span id="opt-fov-value">60°</span></label>
      <input id="opt-fov" type="range" min="40" max="100" value="60" step="1" />
      <div class="esc-help">按 ESC 关闭菜单并继续</div>
    </div>

    <div id="boot">
      <pre>
  BLACKSTREAM RECOVERY UNIT v0.3
  ------------------------------
  loading tape...........[ ok ]
  decoding signal........[ ok ]
  link to subject........[ ok ]

  > press any key to descend
      </pre>
    </div>
  </div>

  <script src="js/textures.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/maze.js"></script>
  <script src="js/player.js"></script>
  <script src="js/input.js"></script>
  <script src="js/raycaster.js"></script>
  <script src="js/vhs.js"></script>
  <script src="js/minimap.js"></script>
  <script src="js/dialogue.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
